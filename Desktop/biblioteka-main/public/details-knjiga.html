<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalji knjige - Biblioteka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">📚 Biblioteka</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="knjiga.html">Knjige</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pozajmica.html">Pozajmice</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="crud-container">
        <h2 id="knjigaNaslov">Učitavanje...</h2>
        <hr>
        <p><strong>Autor:</strong> <span id="autor"></span></p>
        <p><strong>ISBN:</strong> <span id="isbn"></span></p>
        <p><strong>Godina izdanja:</strong> <span id="godinaIzdanja"></span></p>
        <p><strong>Žanr:</strong> <span id="zanr"></span></p>
        <div class="d-flex gap-2 mb-4">
            <a id="editBtn" href="#" class="btn btn-warning btn-sm">Izmeni</a>
            <a href="knjiga.html" class="btn btn-secondary btn-sm">Nazad</a>
        </div>
    </div>

    <hr>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Pozajmice ove knjige</h4>
        <a id="newPozajmicaBtn" href="#" class="btn btn-dark btn-sm">+ Nova pozajmica</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Ime člana</th>
                <th>Datum uzimanja</th>
                <th>Datum vraćanja</th>
                <th>Status</th>
                <th>Akcije</th>
            </tr>
        </thead>
        <tbody id="pozajmicaTableBody">
        </tbody>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const knjigaId = params.get('id');

    async function loadKnjiga() {
        const knjiga = await httpGet(`/api/knjiga/${knjigaId}`);
        document.getElementById('knjigaNaslov').textContent = knjiga.naslov;
        document.getElementById('autor').textContent = knjiga.autor;
        document.getElementById('isbn').textContent = knjiga.isbn;
        document.getElementById('godinaIzdanja').textContent = knjiga.godinaIzdanja;
        document.getElementById('zanr').textContent = knjiga.zanr;
        document.getElementById('editBtn').href = `edit-knjiga.html?id=${knjigaId}`;
        document.getElementById('newPozajmicaBtn').href = `new-pozajmica.html?knjigaId=${knjigaId}`;
    }

    async function loadPozajmice() {
        const pozajmice = await httpGet(`/api/pozajmica/knjiga/${knjigaId}`);
        const tbody = document.getElementById('pozajmicaTableBody');
        tbody.innerHTML = '';

        if (pozajmice.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nema pozajmica za ovu knjigu.</td></tr>';
            return;
        }

        pozajmice.forEach((p, index) => {
            const status = p.datumVracanja
                ? '<span class="badge bg-success">Vraćena</span>'
                : '<span class="badge bg-danger">Nije vraćena</span>';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${p.imeclana}</td>
                <td>${p.datumUzimanja}</td>
                <td>${p.datumVracanja ?? '-'}</td>
                <td>${status}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deletePozajmica(${p.pozajmicaId})">Obriši</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function deletePozajmica(id) {
        const result = await Swal.fire({
            title: 'Da li ste sigurni?',
            text: 'Pozajmica će biti obrisana!',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Da, obriši!',
            cancelButtonText: 'Odustani'
        });

        if (result.isConfirmed) {
            const status = await httpDelete(`/api/pozajmica/${id}`);
            if (status === 204) {
                Swal.fire('Obrisano!', 'Pozajmica je obrisana.', 'success');
                loadPozajmice();
            } else {
                Swal.fire('Greška!', 'Došlo je do greške.', 'error');
            }
        }
    }

    loadKnjiga();
    loadPozajmice();
</script>
</body>
</html>
