<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knjige - Biblioteka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">📚 Biblioteka</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="knjiga.html">Knjige</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pozajmica.html">Pozajmice</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Knjige</h2>
        <a href="new-knjiga.html" class="btn btn-dark">+ Dodaj knjigu</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Naslov</th>
                <th>Autor</th>
                <th>ISBN</th>
                <th>Godina</th>
                <th>Žanr</th>
                <th>Akcije</th>
            </tr>
        </thead>
        <tbody id="knjigaTableBody">
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script>
    async function loadKnjige() {
        const knjige = await httpGet('/api/knjiga');
        const tbody = document.getElementById('knjigaTableBody');
        tbody.innerHTML = '';

        if (knjige.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">Nema knjiga u katalogu.</td></tr>';
            return;
        }

        knjige.forEach((knjiga, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${knjiga.naslov}</td>
                <td>${knjiga.autor}</td>
                <td>${knjiga.isbn}</td>
                <td>${knjiga.godinaIzdanja}</td>
                <td>${knjiga.zanr}</td>
                <td>
                    <a href="details-knjiga.html?id=${knjiga.knjigaId}" class="btn btn-sm btn-secondary">Detalji</a>
                    <a href="edit-knjiga.html?id=${knjiga.knjigaId}" class="btn btn-sm btn-warning">Izmeni</a>
                    <button class="btn btn-sm btn-danger" onclick="deleteKnjiga(${knjiga.knjigaId})">Obriši</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function deleteKnjiga(id) {
        const result = await Swal.fire({
            title: 'Da li ste sigurni?',
            text: 'Knjiga će biti obrisana!',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Da, obriši!',
            cancelButtonText: 'Odustani'
        });

        if (result.isConfirmed) {
            const status = await httpDelete(`/api/knjiga/${id}`);
            if (status === 204) {
                Swal.fire('Obrisano!', 'Knjiga je uspešno obrisana.', 'success');
                loadKnjige();
            } else {
                Swal.fire('Greška!', 'Došlo je do greške.', 'error');
            }
        }
    }

    loadKnjige();
</script>
</body>
</html>
