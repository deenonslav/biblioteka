<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova knjiga - Biblioteka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">📚 Biblioteka</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="knjiga.html">Knjige</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="pozajmica.html">Pozajmice</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="crud-container">
        <h2>Nova knjiga</h2>
        <hr>

        <div class="mb-3">
            <label for="naslov" class="form-label">Naslov</label>
            <input type="text" class="form-control" id="naslov" placeholder="Unesite naslov knjige">
        </div>

        <div class="mb-3">
            <label for="autor" class="form-label">Autor</label>
            <input type="text" class="form-control" id="autor" placeholder="Ime i prezime autora">
        </div>

        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" class="form-control" id="isbn" placeholder="npr. 978-86-7436-123-4">
        </div>

        <div class="mb-3">
            <label for="godinaIzdanja" class="form-label">Godina izdanja</label>
            <input type="number" class="form-control" id="godinaIzdanja" placeholder="npr. 2020" min="1000" max="2100">
        </div>

        <div class="mb-3">
            <label for="zanr" class="form-label">Žanr</label>
            <select class="form-select" id="zanr">
                <option value="">-- Izaberite žanr --</option>
                <option value="Roman">Roman</option>
                <option value="Naučna fantastika">Naučna fantastika</option>
                <option value="Fantazija">Fantazija</option>
                <option value="Bajka">Bajka</option>
                <option value="Detektivski">Detektivski</option>
                <option value="Istorijski">Istorijski</option>
                <option value="Biografija">Biografija</option>
                <option value="Naučna literatura">Naučna literatura</option>
                <option value="Ostalo">Ostalo</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-dark" onclick="saveKnjiga()">Sačuvaj</button>
            <a href="knjiga.html" class="btn btn-secondary">Odustani</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/utils.js"></script>
<script>
    async function saveKnjiga() {
        const naslov = document.getElementById('naslov').value.trim();
        const autor = document.getElementById('autor').value.trim();
        const isbn = document.getElementById('isbn').value.trim();
        const godinaIzdanja = document.getElementById('godinaIzdanja').value;
        const zanr = document.getElementById('zanr').value;

        if (!naslov || !autor || !isbn || !godinaIzdanja || !zanr) {
            Swal.fire('Greška!', 'Sva polja su obavezna.', 'error');
            return;
        }

        const data = {
            naslov: naslov,
            autor: autor,
            isbn: isbn,
            godinaIzdanja: parseInt(godinaIzdanja),
            zanr: zanr
        };

        const result = await httpPost('/api/knjiga', data);

        if (result.knjigaId) {
            await Swal.fire('Uspešno!', 'Knjiga je dodana u katalog.', 'success');
            window.location.href = 'knjiga.html';
        } else {
            Swal.fire('Greška!', 'Došlo je do greške pri čuvanju.', 'error');
        }
    }
</script>
</body>
</html>
